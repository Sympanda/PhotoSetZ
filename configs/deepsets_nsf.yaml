run_name: deepsets_nsf
output_dir: outputs

data:
  train_path: data/ellen/train_175k.parquet
  test_path:  data/ellen/test_25k.parquet
  res_dir:    data/ellen
  target_col: true_redshift
  active_surveys: []
  log_target: true   # NOTE: set nsf.z_max to log(1+z_max) below

model:
  type:      deepsets
  token_dim: 4
  use_coverage: true   # n_active/n_available scalar fed to head
  deepsets:
    phi_hidden: [256, 256]
    latent_dim: 256
    rho_hidden: [512, 512, 256]
    embed_dim:  256
    pooling:    attention
    dropout:    0.2
    activation: gelu

# ── Neural Spline Flow head ─────────────────────────────────────────────────
# Advantages over MDN:  exact CDF/inverse, more flexible, better calibration
# Advantages over BinnedPDF: continuous, compact parameter set
#
# z_max should be set to log(1 + z_true_max):
#   z ∈ [0, 3.0] → log(4)   ≈ 1.386   (use 1.40 for safety margin)
#   z ∈ [0, 2.5] → log(3.5) ≈ 1.253   (use 1.26)
head:
  type: nsf
  nsf:
    n_bins:      48          # more bins = more flexible PDF  (16–64 typical)
    z_min:       0.0
    z_max:       1.40        # log(1+3.0) ≈ 1.386 — use 1.40 with log_target=true
    hidden_dims: [128, 64]
    dropout:     0.1
    activation:  gelu
    deriv_min:   0.001       # minimum spline knot derivative (numerical stability)

training:
  batch_size:          512
  lr:                  5e-4
  weight_decay:        1e-4
  epochs:              120
  warmup_epochs:       10
  clip_grad_norm:      1.0
  num_workers:         4
  seed:                42
  early_stop_patience: 20
  val_every:           1
  save_best:           true

  # Posterior calibration (probabilistic heads: MDN, BinnedPDF, NSF)
  fisher_lambda: 0.0      # penalises over-confident (sharp) posteriors — U-shaped PIT
  spread_lambda: 0.01    # penalises over-dispersed (broad) posteriors — n-shaped PIT
  val_dropout:   true     # second val pass with dropout; seed fixed per epoch

  dropout:
    p_complete:               0.15
    p_preset:                 0.25
    p_survey_drop:            0.25
    p_aggressive:             0.35
    aggressive_rate_low:      0.3
    aggressive_rate_high:     0.8
    max_surveys_to_drop:      2
    p_filter_after_survey:    0.4
    filter_rate_after_survey: 0.25
    min_filters:              3
