run_name: 06_set_transformer_mlp
output_dir: outputs

data:
  train_path: data/ellen/train_175k.parquet
  test_path:  data/ellen/test_25k.parquet
  res_dir:    data/ellen
  target_col: true_redshift
  # Restrict to specific surveys or individual filters.
  # Survey names: lsst | roman | euclid | wise
  # Column names: e.g. mag_g_lsst, Roman_Y106
  # Leave empty to use all 16 filters.
  active_surveys: []
  # Train in log(1+z) space to reduce tail bias.
  # All metrics and plots are always reported in real z.
  log_target: true

model:
  type:      set_transformer
  token_dim: 4          # [mag_norm, log_lambda_norm, log_dlambda_norm, survey_id_norm]
  use_coverage: true   # n_active/n_available scalar fed to head
  set_transformer:
    embed_dim:         128
    n_heads:           4
    n_attn_layers:     2
    ffn_dim:           512    # 4 * embed_dim; null → auto
    n_pma_seeds:       1
    dropout:           0.1
    pre_embed_hidden:  [64]

# ── Prediction head ────────────────────────────────────────────────────────────
# Set head.type to select which head is active.
# All head configs are shown below; only the active one is used.

head:
  type: mlp_regressor   # mlp_regressor | binned_pdf | mdn

  # ── Option 1: MLP Regressor ─────────────────────────────────────
  # Simple MLP → scalar z, Huber loss.
  mlp_regressor:
    hidden_dims: [64, 32]
    dropout:     0.1
    huber_delta: 0.5       # smooth L1 delta; larger → closer to MSE
    activation:  gelu      # gelu | relu | silu | leaky_relu | tanh

  # ── Option 2: Binned PDF ─────────────────────────────────────────
  # Outputs a discrete p(z) over K uniform bins, cross-entropy loss.
  # Point estimate is the weighted mean of bin centres.
  binned_pdf:
    n_bins:      100
    z_min:       0.0
    z_max:       3.0
    hidden_dims: [64]
    dropout:     0.1
    activation:  gelu

  # ── Option 3: Mixture Density Network ────────────────────────────
  # Outputs a Gaussian mixture posterior, NLL loss.
  # Point estimate is the mean of the dominant component.
  mdn:
    n_components: 5
    hidden_dims:  [64]
    dropout:      0.1
    sigma_min:    0.01     # minimum component std (numerical stability)
    activation:   gelu

training:
  batch_size:          256
  lr:                  5.0e-4   # slightly lower LR for transformer
  weight_decay:        1.0e-4
  epochs:              200
  lr_scheduler:        cosine
  warmup_epochs:       10       # longer warmup for transformer
  clip_grad_norm:      1.0
  num_workers:         4
  seed:                42
  log_every:           200
  val_every:           1
  save_best:           true
  early_stop_patience: 15

  # Posterior calibration (probabilistic heads: MDN, BinnedPDF, NSF)
  fisher_lambda: 0.0      # penalises over-confident (sharp) posteriors — U-shaped PIT
  spread_lambda: 0.01    # penalises over-dispersed (broad) posteriors — n-shaped PIT
  val_dropout:   true     # second val pass with dropout; seed fixed per epoch

  dropout:
    p_complete:               0.15
    p_preset:                 0.25
    p_survey_drop:            0.25
    p_aggressive:             0.35
    aggressive_rate_low:      0.30
    aggressive_rate_high:     0.80
    max_surveys_to_drop:      3
    p_filter_after_survey:    0.40
    filter_rate_after_survey: 0.25
    min_filters:              3
