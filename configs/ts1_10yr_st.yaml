# ──────────────────────────────────────────────────────────────────────────────
# Task Set 1  ·  Cardinal simulation  ·  10-year depth  ·  IID baseline
# Set Transformer encoder variant — compare against pzdc_ts1_10yr.yaml
# ──────────────────────────────────────────────────────────────────────────────

run_name: ts1_10yr_01_st
output_dir: outputs

data:
  train_path: data/pzdc/ts1_cardinal_10yr_train.parquet
  test_path:  data/pzdc/ts1_cardinal_10yr_test.parquet
  res_dir:    data/ellen
  target_col: redshift
  active_surveys: [lsst, roman]
  log_target: true
  include_errors: true

model:
  type:      set_transformer
  token_dim: 5           # [m_norm, log_λ, log_Δλ, survey_id, σ_norm]
  use_coverage: true   # n_active/n_available scalar fed to head
  set_transformer:
    embed_dim:        384
    n_heads:          12      # 256 / 8 = 32 per head
    n_attn_layers:    4
    ffn_dim:          1024    # 2 × embed_dim (conservative for regularisation)
    n_pma_seeds:      1
    dropout:          0.1
    pre_embed_hidden: [128,256]  # slightly larger than Ellen since token_dim=5

head:
  type: mdn
  mlp_regressor:
    hidden_dims: [256, 512, 256, 128, 64]
    dropout:     0.2
    huber_delta: 0.5
    activation:  leaky_relu
  binned_pdf:
    n_bins:      200
    z_min:       0.0
    z_max:       3.0
    hidden_dims: [64]
    dropout:     0.2
    activation:  gelu
  mdn:
    n_components: 8
    hidden_dims:  [256, 512, 256, 128, 64]
    dropout:      0.1
    sigma_min:    0.01
    activation:   gelu

training:
  batch_size:          512
  lr:                  2.0e-4   # transformers benefit from slightly lower LR
  weight_decay:        2.0e-4
  epochs:              250
  lr_scheduler:        cosine
  warmup_epochs:       25       # longer warmup is important for transformers
  clip_grad_norm:      1.0
  num_workers:         4
  seed:                42
  log_every:           200
  val_every:           1
  save_best:           true
  early_stop_patience: 20

  # Posterior calibration (probabilistic heads: MDN, BinnedPDF, NSF)
  fisher_lambda: 0.0      # only for U-shaped PIT (over-confident); do NOT use with n-shape
  spread_lambda: 5.0
  huber_lambda:  0.2     # auxiliary point loss on top of NLL (σ_NMAD)
  huber_delta:   0.5
  val_dropout:   true     # second val pass with dropout; seed fixed per epoch

  # Full-filter curriculum: learn the complete LSST+Roman map first
  full_filter_epochs:     0
  dropout_resume_lr_mult: 1   # gentle LR bump when dropout resumes
  early_stop_min_epoch:   25     # patience only counts after curriculum

  # Post-hoc σ scaling (MDN / NSF only) — writes calibration/post_hoc.json
  # into the same run directory; no retrain. Notebook "View" dropdown exposes
  # Posterior vs Posterior + post-hoc σ.
  post_hoc_calibration:
    enabled:    true
    sigma_min:  0.2
    sigma_max:  1.0

  # Split training: stage 1 MLP → freeze encoder → stage 2 MDN/NSF.
  # Uncomment to enable (writes best_point.pt + best_posterior.pt).
  # split_training: true
  # stage1:
  #   head: mlp_regressor
  #   epochs: 150
  #   huber_lambda: 0.2
  # stage2:
  #   head: mdn          # or nsf — inherits head.type if omitted
  #   epochs: 80
  #   freeze_encoder: true
  #   huber_lambda: 0.0
  #   spread_lambda: 10.0

  dropout:
    p_complete:               0.40
    p_preset:                 0.20
    p_survey_drop:            0.20
    p_aggressive:             0.20
    aggressive_rate_low:      0.30
    aggressive_rate_high:     0.80
    max_surveys_to_drop:      2
    p_filter_after_survey:    0.40
    filter_rate_after_survey: 0.25
    min_filters:              3
