# ──────────────────────────────────────────────────────────────────────────────
# Task Set 1  ·  Cardinal simulation  ·  10-year depth  ·  IID baseline
# Set Transformer + NSF head — end-to-end
# Based on ts1_10yr_st.yaml (08_st architecture)
# ──────────────────────────────────────────────────────────────────────────────

run_name: ts1_10yr_nsf_st
output_dir: outputs

data:
  train_path: data/pzdc/ts1_cardinal_10yr_train.parquet
  test_path:  data/pzdc/ts1_cardinal_10yr_test.parquet
  res_dir:    data/ellen
  target_col: redshift
  active_surveys: [lsst, roman]
  log_target: true
  include_errors: true

model:
  type:      set_transformer
  token_dim: 5
  use_coverage: true
  set_transformer:
    embed_dim:        384
    n_heads:          12
    n_attn_layers:    4
    ffn_dim:          1024
    n_pma_seeds:      1
    dropout:          0.1
    pre_embed_hidden: [128, 256]

head:
  type: nsf
  mlp_regressor:
    hidden_dims: [256, 512, 256, 128, 64]
    dropout:     0.2
    huber_delta: 0.5
    activation:  leaky_relu
  nsf:
    n_bins:      48
    z_min:       0.0
    z_max:       1.40        # log(1+3) ≈ 1.386 — required when log_target: true
    hidden_dims: [256, 128, 64]
    dropout:     0.1
    activation:  gelu
    deriv_min:   0.001

training:
  batch_size:          512
  lr:                  2.0e-5
  weight_decay:        1.0e-4
  epochs:              250
  lr_scheduler:        cosine
  warmup_epochs:       15
  clip_grad_norm:      0.5
  num_workers:         4
  seed:                42
  log_every:           200
  val_every:           1
  save_best:           true
  early_stop_patience: 20

  fisher_lambda: 0.0
  spread_lambda: 0.05      # NSF often needs less than MDN; tune if PIT is n-shaped
  huber_lambda:  0.0
  huber_delta:   0.0
  val_dropout:   true

  full_filter_epochs:     0
  dropout_resume_lr_mult: 1
  early_stop_min_epoch:   25

  post_hoc_calibration:
    enabled:    false
    sigma_min:  0.2
    sigma_max:  1.0

  dropout:
    p_complete:               0.40
    p_preset:                 0.20
    p_survey_drop:            0.20
    p_aggressive:             0.20
    aggressive_rate_low:      0.30
    aggressive_rate_high:     0.80
    max_surveys_to_drop:      2
    p_filter_after_survey:    0.40
    filter_rate_after_survey: 0.25
    min_filters:              3
