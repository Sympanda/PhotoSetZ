# ──────────────────────────────────────────────────────────────────────────────
# Task Set 1  ·  Cardinal simulation  ·  1-year depth  ·  IID baseline
# ──────────────────────────────────────────────────────────────────────────────
#
# What this dataset is:
#   Same IID population as TS1-10yr but with shallower Rubin photometry
#   (1-year observing depth instead of 10-year).  Faint objects will have
#   larger magnitude errors and more non-detections (NaN) in the bluer/redder
#   bands.  Good for testing early-LSST-like performance.
#
# Differences from TS1-10yr:
#   • More NaN values in u, y, and Roman bands — the model handles these
#     gracefully via per-galaxy masking, but the effective token set will be
#     smaller on average.
#   • Increase aggressive dropout slightly to match shallower NaN fraction.
#   • Lower lr and more patience since the noisier data makes training bumpier.
# ──────────────────────────────────────────────────────────────────────────────

run_name: ts1_1yr
output_dir: outputs

data:
  train_path: data/pzdc/ts1_cardinal_1yr_train.parquet
  test_path:  data/pzdc/ts1_cardinal_1yr_test.parquet
  res_dir:    data/ellen
  target_col: redshift
  active_surveys: [lsst, roman]
  log_target: true
  include_errors: true

model:
  type:      deepsets
  token_dim: 5
  use_coverage: true   # n_active/n_available scalar fed to head
  deepsets:
    phi_hidden: [256, 256]
    latent_dim: 256
    rho_hidden: [512, 512, 256]
    embed_dim:  256
    pooling:    attention
    dropout:    0.25         # slightly more dropout for noisier data
    activation: gelu

head:
  type: mlp_regressor
  mlp_regressor:
    hidden_dims: [256, 512, 256, 128, 64]
    dropout:     0.25
    huber_delta: 0.5
    activation:  leaky_relu
  binned_pdf:
    n_bins:      200
    z_min:       0.0
    z_max:       3.0
    hidden_dims: [64]
    dropout:     0.2
    activation:  gelu
  mdn:
    n_components: 5
    hidden_dims:  [64]
    dropout:      0.1
    sigma_min:    0.01
    activation:   gelu

training:
  batch_size:          256
  lr:                  3.0e-4       # lower LR for noisier gradients
  weight_decay:        2.0e-4
  epochs:              200
  lr_scheduler:        cosine
  warmup_epochs:       10
  clip_grad_norm:      1.0
  num_workers:         4
  seed:                42
  log_every:           200
  val_every:           1
  save_best:           true
  early_stop_patience: 25           # more patience for noisy val loss

  # Posterior calibration (probabilistic heads: MDN, BinnedPDF, NSF)
  fisher_lambda: 0.0      # penalises over-confident (sharp) posteriors — U-shaped PIT
  spread_lambda: 0.01    # penalises over-dispersed (broad) posteriors — n-shaped PIT
  val_dropout:   true     # second val pass with dropout; seed fixed per epoch

  dropout:
    p_complete:               0.10  # less complete-set since many NaNs anyway
    p_preset:                 0.25
    p_survey_drop:            0.25
    p_aggressive:             0.40  # more aggressive to simulate missing bands
    aggressive_rate_low:      0.35
    aggressive_rate_high:     0.85
    max_surveys_to_drop:      2
    p_filter_after_survey:    0.40
    filter_rate_after_survey: 0.30
    min_filters:              3
