# ──────────────────────────────────────────────────────────────────────────────
# Task Set 2  ·  Cardinal simulation  ·  1-year depth  ·  Spectroscopic bias
# Set Transformer encoder variant — compare against pzdc_ts2_1yr.yaml
# ──────────────────────────────────────────────────────────────────────────────

run_name: ts2_1yr_st
output_dir: outputs

data:
  train_path: data/pzdc/ts2_cardinal_1yr_train.parquet
  test_path:  data/pzdc/ts2_cardinal_1yr_test.parquet
  res_dir:    data/ellen
  target_col: redshift
  active_surveys: [lsst, roman]
  log_target: true
  include_errors: true

model:
  type:      set_transformer
  token_dim: 5
  use_coverage: true   # n_active/n_available scalar fed to head
  set_transformer:
    embed_dim:        256
    n_heads:          8
    n_attn_layers:    3
    ffn_dim:          512
    n_pma_seeds:      1
    dropout:          0.1
    pre_embed_hidden: [128]

head:
  type: mlp_regressor
  mlp_regressor:
    hidden_dims: [256, 512, 256, 128, 64]
    dropout:     0.3
    huber_delta: 1.0
    activation:  leaky_relu
  binned_pdf:
    n_bins:      200
    z_min:       0.0
    z_max:       3.0
    hidden_dims: [64]
    dropout:     0.2
    activation:  gelu
  mdn:
    n_components: 8
    hidden_dims:  [128, 64]
    dropout:      0.2
    sigma_min:    0.01
    activation:   gelu

training:
  batch_size:          512
  lr:                  1.5e-4   # lowest LR: spec bias + 1yr noise + transformer
  weight_decay:        3.0e-4
  epochs:              250
  lr_scheduler:        cosine
  warmup_epochs:       20
  clip_grad_norm:      1.0
  num_workers:         4
  seed:                42
  log_every:           200
  val_every:           1
  save_best:           true
  early_stop_patience: 30

  # Posterior calibration (probabilistic heads: MDN, BinnedPDF, NSF)
  fisher_lambda: 0.0      # penalises over-confident (sharp) posteriors — U-shaped PIT
  spread_lambda: 0.01
  huber_lambda:  1.0
  huber_delta:   1.0
  val_dropout:   true

  full_filter_epochs:     20
  dropout_resume_lr_mult: 1.5
  early_stop_min_epoch:   20

  dropout:
    p_complete:               0.20
    p_preset:                 0.20
    p_survey_drop:            0.30
    p_aggressive:             0.30
    aggressive_rate_low:      0.40
    aggressive_rate_high:     0.90
    max_surveys_to_drop:      2
    p_filter_after_survey:    0.50
    filter_rate_after_survey: 0.40
    min_filters:              3
