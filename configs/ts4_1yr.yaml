# ──────────────────────────────────────────────────────────────────────────────
# Task Set 4  ·  Cardinal simulation  ·  1-year depth  ·  Blending + spec bias
#
# ⚠  DATA NOT YET PUBLIC — Task Set 4 is not in the current public archive.
#    This config is a placeholder for when the data is released.
#    Check: https://pz-data-challenge.readthedocs.io/en/latest/
# ──────────────────────────────────────────────────────────────────────────────
#
# What this dataset is:
#   The hardest task set.  Combines all the difficulties of TS3 with object
#   blending: galaxies within the Rubin PSF have their fluxes combined into a
#   single detected object.  The blend is assigned the redshift of its
#   *brightest* component, but the measured photometry is the sum of all
#   components — potentially from very different redshifts.
#
#   Additional challenge: only 1-year training data is provided (no 10yr).
#   So the training photometry is shallower and noisier than the 10yr test data.
#   This is a time-domain domain shift on top of the spectroscopic selection bias.
#
#   Spectroscopic selection same as TS3 (DESI + zCOSMOS + COSMOS2020 etc.).
#
# Training strategy notes:
#   Blending means the photometry is fundamentally corrupted in a way the
#   model cannot fully "undo" without morphological information.  The σ_m
#   errors (include_errors=true) are important here because blended objects
#   may have unusual colours AND unusual error patterns.
#
#   • Maximum regularisation (highest dropout).
#   • Larger Huber delta: blended object redshifts are inherently ambiguous
#     so catastrophic outliers are expected even with a good model.
#   • Binned PDF or MDN is especially useful here: the blend ambiguity
#     creates genuine multi-modal photo-z posteriors that an MLP regressor
#     cannot express.
#   • Consider treating this as a research benchmark rather than expecting
#     good performance — blending is a known hard problem.
#
# Note: No 10-year training file exists for TS4.  The test set is 10yr depth.
# ──────────────────────────────────────────────────────────────────────────────

run_name: ts4_1yr
output_dir: outputs

data:
  train_path: data/pzdc/ts4_cardinal_1yr_train.parquet
  test_path:  data/pzdc/ts4_cardinal_1yr_test.parquet
  res_dir:    data/ellen
  target_col: redshift
  active_surveys: [lsst, roman]
  log_target: true
  include_errors: true

model:
  type:      deepsets
  token_dim: 5
  use_coverage: true   # n_active/n_available scalar fed to head
  deepsets:
    phi_hidden: [256, 256]
    latent_dim: 256
    rho_hidden: [512, 512, 256]
    embed_dim:  256
    pooling:    attention
    dropout:    0.35
    activation: gelu

head:
  # Binned PDF recommended: blending creates genuine multi-modal posteriors
  # that a binned softmax can capture (each galaxy might really be one of
  # several redshifts depending on which blend component dominates).
  # Switch type to mlp_regressor for a quick point-estimate baseline.
  type: binned_pdf
  mlp_regressor:
    hidden_dims: [256, 512, 256, 128, 64]
    dropout:     0.35
    huber_delta: 2.0          # very tolerant — blends are fundamentally ambiguous
    activation:  leaky_relu
  binned_pdf:
    n_bins:      200
    z_min:       0.0
    z_max:       3.0
    hidden_dims: [256, 128]
    dropout:     0.3
    activation:  gelu
  mdn:
    n_components: 10
    hidden_dims:  [256, 128]
    dropout:      0.3
    sigma_min:    0.01
    activation:   gelu

training:
  batch_size:          256
  lr:                  2.0e-4
  weight_decay:        4.0e-4
  epochs:              300
  lr_scheduler:        cosine
  warmup_epochs:       20
  clip_grad_norm:      1.0
  num_workers:         4
  seed:                42
  log_every:           200
  val_every:           1
  save_best:           true
  early_stop_patience: 40

  # Posterior calibration (probabilistic heads: MDN, BinnedPDF, NSF)
  fisher_lambda: 0.0      # penalises over-confident (sharp) posteriors — U-shaped PIT
  spread_lambda: 0.01    # penalises over-dispersed (broad) posteriors — n-shaped PIT
  val_dropout:   true     # second val pass with dropout; seed fixed per epoch

  dropout:
    # Maximally aggressive: model must generalise from 1yr shallow+blended
    # training data to 10yr deep+blended test data
    p_complete:               0.05
    p_preset:                 0.10
    p_survey_drop:            0.35
    p_aggressive:             0.50  # half of training steps use heavy random masking
    aggressive_rate_low:      0.40
    aggressive_rate_high:     0.90
    max_surveys_to_drop:      2
    p_filter_after_survey:    0.60
    filter_rate_after_survey: 0.45
    min_filters:              3
